<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Dr. Toru</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main id="app-shell" class="app">
      <p id="appError" class="app-error" hidden></p>

      <section
        id="screen-list"
        class="view"
        data-screen="list"
        hidden
        aria-hidden="true"
      >
        <header class="view-header">
          <h1 class="view-title">Sessions</h1>
          <span class="local-badge">On-device</span>
          <span id="asrLoading" class="asr-loading" hidden>Loading ASR…</span>
          <button
            id="settingsBtn"
            class="back-btn"
            type="button"
            aria-label="Open settings"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </header>
        <div class="view-body" id="recording-list"></div>
        <div class="view-fab">
          <a href="#recording" class="fab-btn fab-primary">
            <svg
              class="fab-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            New Session
          </a>
        </div>
      </section>

      <section id="screen-recording" class="view" data-screen="recording">
        <header class="view-header">
          <a href="#list" class="back-btn" aria-label="Back to sessions">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </a>
          <div class="view-header-content">
            <span class="detail-type">Dictation</span>
            <div class="header-meta">
              <span
                id="recordingTimer"
                class="meta-item meta-timer"
                role="timer"
                aria-label="Recording duration"
                >0:00</span
              >
            </div>
          </div>
          <div class="header-status">
            <div class="status-indicator">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </div>
          </div>
        </header>
        <div class="view-body">
          <textarea
            id="transcript"
            class="transcript context-input"
            readonly
            aria-label="Running transcript"
            placeholder="Tap Transcribe to begin dictation…"
          ></textarea>
        </div>
        <div class="folder-actions">
          <button
            id="recordBtn"
            class="action-btn action-record"
            type="button"
            disabled
          >
            Transcribe
          </button>
        </div>
      </section>

      <section
        id="screen-settings"
        class="view"
        data-screen="settings"
        hidden
        aria-hidden="true"
      >
        <header class="view-header">
          <a href="#list" class="back-btn" aria-label="Back to sessions">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </a>
          <h2 class="view-title">Settings</h2>
        </header>
        <div class="view-body">
          <p id="pluginSummary" class="placeholder">
            Plugin registry loading...
          </p>
          <div class="actions">
            <button id="importPluginBtn" type="button">
              Import Model File
            </button>
            <button id="toggleLlmBtn" type="button" disabled>
              Start LLM Service
            </button>
          </div>
          <p id="llmServiceStatus" class="status">LLM service: unavailable</p>
          <h3>LLM Test</h3>
          <textarea
            id="llmInput"
            class="transcript"
            rows="5"
            placeholder="Paste note text to test LLM output."
          ></textarea>
          <div class="actions">
            <button id="runLlmBtn" type="button" disabled>Run LLM Test</button>
          </div>
          <div id="llmOutput" class="transcript">(No LLM output)</div>
        </div>
      </section>
    </main>
  </body>
</html>
