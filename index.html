<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Dr. Toru</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main id="app-shell" class="app">
      <p id="appError" class="app-error" hidden></p>

      <section
        id="screen-list"
        class="view"
        data-screen="list"
        hidden
        aria-hidden="true"
      >
        <header class="view-header">
          <h1 class="view-title">Sessions</h1>
          <button
            id="settingsBtn"
            class="back-btn"
            type="button"
            aria-label="Open settings"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </header>
        <div class="view-body" id="recording-list"></div>
        <div class="view-fab">
          <a href="#recording" class="fab-btn fab-primary">
            <svg
              class="fab-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            New Session
          </a>
        </div>
      </section>

      <section id="screen-recording" class="view" data-screen="recording">
        <header class="view-header">
          <a href="#list" class="back-btn" aria-label="Back to sessions">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </a>
          <div class="view-header-content">
            <span class="detail-type">Dictation</span>
          </div>
          <span
            id="recordingTimer"
            class="meta-item meta-timer"
            role="timer"
            aria-label="Recording duration"
            >0:00</span
          >
          <button
            id="headerRecordBtn"
            class="header-record-btn"
            type="button"
            disabled
            aria-label="Toggle recording"
          >
            <svg
              class="icon-mic"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
            <svg
              class="icon-stop"
              viewBox="0 0 24 24"
              fill="currentColor"
              stroke="none"
            >
              <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
            <div class="status-indicator">
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
              <span class="bar"></span>
            </div>
            <span class="loading-dots" aria-hidden="true">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </span>
            <span class="record-btn-label">Transcribe</span>
          </button>
        </header>
        <div class="view-body">
          <div class="section-block">
            <div class="section-header">
              <span class="section-label"
                ><svg
                  class="section-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                  />
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1" /></svg
                >Context</span
              >
            </div>
            <textarea
              id="contextNote"
              class="section-input"
              aria-label="Clinical context notes"
              placeholder="Add any additional context about the patient or paste files here"
              rows="6"
            ></textarea>
          </div>
          <div class="transcript-area">
            <div class="section-header">
              <span class="section-label"
                ><svg
                  class="section-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
                  />
                  <polyline points="14 2 14 8 20 8" />
                  <line x1="16" y1="13" x2="8" y2="13" />
                  <line x1="16" y1="17" x2="8" y2="17" />
                  <polyline points="10 9 9 9 8 9" /></svg
                >Transcript</span
              >
              <button
                id="copyTranscriptBtn"
                class="section-action-btn"
                type="button"
              >
                Copy
              </button>
            </div>
            <div
              id="transcript"
              class="transcript-bubbles"
              role="log"
              aria-live="polite"
              aria-label="Running transcript"
            ></div>
            <div id="transcriptBlankState" class="transcript-blank-state">
              <p class="blank-state-text">
                Start recording or upload an audio file to generate a transcript
              </p>
            </div>
            <div
              id="typingIndicator"
              class="typing-indicator"
              role="status"
              aria-label="Listening"
              hidden
            >
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="typing-label">Listening</span>
            </div>
          </div>
        </div>
        <div class="transcribe-action-bar">
          <input
            id="transcriptUploadInput"
            type="file"
            accept="audio/*,.wav,.mp3,.m4a,.aac,.ogg,.webm,.mp4"
            hidden
          />
          <button
            id="uploadTranscriptBtn"
            class="upload-btn"
            type="button"
            aria-label="Upload audio file"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3v12" />
              <polyline points="7 8 12 3 17 8" />
              <path d="M5 15v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4" />
            </svg>
            Upload
          </button>
          <button
            id="recordBtn"
            class="transcribe-btn"
            type="button"
            disabled
            aria-label="Toggle recording"
          >
            <svg
              class="icon-mic"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
            <svg
              class="icon-stop"
              viewBox="0 0 24 24"
              fill="currentColor"
              stroke="none"
            >
              <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
            <span class="record-btn-label">Transcribe</span>
            <span class="loading-label">Loading</span>
            <span class="loading-dots" aria-hidden="true">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </span>
          </button>
        </div>
      </section>

      <section
        id="screen-settings"
        class="view"
        data-screen="settings"
        hidden
        aria-hidden="true"
      >
        <header class="view-header">
          <a href="#list" class="back-btn" aria-label="Back to sessions">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </a>
          <h2 class="view-title">Settings</h2>
        </header>
        <div class="view-body">
          <h3>Dictation</h3>
          <div class="plugin-list">
            <div class="plugin-row">
              <div class="plugin-info">
                <div class="plugin-name">Medical Dictation</div>
                <div class="plugin-meta">Built-in</div>
              </div>
              <div class="plugin-controls">
                <label class="plugin-enabled-toggle">
                  <input id="asrEnabled" type="checkbox" />
                  <span>Enabled</span>
                </label>
              </div>
            </div>
            <div class="plugin-row">
              <div class="plugin-info">
                <div class="plugin-name">Enhanced Dictation</div>
                <div class="plugin-meta">
                  Experimental, may be slower on some devices
                </div>
              </div>
              <div class="plugin-controls">
                <label class="plugin-enabled-toggle">
                  <input id="asrBeamSearchEnabled" type="checkbox" />
                  <span>Enabled</span>
                </label>
              </div>
            </div>
          </div>
          <details class="settings-advanced">
            <summary>Advanced dictation tuning</summary>
            <p id="asrSettingsStatus" class="status"></p>
            <div class="settings-grid">
              <label class="setting-field">
                <span>Silence RMS</span>
                <input
                  id="asrSilenceRms"
                  type="number"
                  min="0.0001"
                  max="0.05"
                  step="0.0001"
                />
              </label>
              <label class="setting-field">
                <span>Silence Peak</span>
                <input
                  id="asrSilencePeak"
                  type="number"
                  min="0.0001"
                  max="0.2"
                  step="0.0001"
                />
              </label>
              <label class="setting-field">
                <span>Silence Hangover (ms)</span>
                <input
                  id="asrSilenceHangoverMs"
                  type="range"
                  min="100"
                  max="2000"
                  step="50"
                />
                <output id="asrSilenceHangoverOutput">500</output>
              </label>
              <label class="setting-field">
                <span>ORT Threads</span>
                <input
                  id="asrOrtThreads"
                  type="number"
                  min="1"
                  max="2"
                  step="1"
                />
              </label>
              <label class="setting-field">
                <span>Beam Width</span>
                <input
                  id="asrBeamWidth"
                  type="number"
                  min="1"
                  max="32"
                  step="1"
                />
              </label>
              <label class="setting-field">
                <span>LM Alpha</span>
                <input
                  id="asrLmAlpha"
                  type="number"
                  min="0"
                  max="3"
                  step="0.1"
                />
              </label>
              <label class="setting-field">
                <span>LM Beta</span>
                <input
                  id="asrLmBeta"
                  type="number"
                  min="-2"
                  max="5"
                  step="0.1"
                />
              </label>
              <label class="setting-field">
                <span>Min Token LogP</span>
                <input
                  id="asrMinTokenLogp"
                  type="number"
                  min="-20"
                  max="0"
                  step="0.1"
                />
              </label>
              <label class="setting-field">
                <span>Beam Prune LogP</span>
                <input
                  id="asrBeamPruneLogp"
                  type="number"
                  min="-30"
                  max="0"
                  step="0.1"
                />
              </label>
            </div>
            <div class="actions" style="margin-top: var(--space-4)">
              <button id="saveAsrSettingsBtn" type="button">Save</button>
            </div>
          </details>
          <h3>Plugins</h3>
          <div id="pluginList" class="plugin-list"></div>
          <div class="actions">
            <button id="importPluginBtn" type="button">Import Plugin</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
