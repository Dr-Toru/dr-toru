name: release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - macos
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint, format check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

  publish:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON((github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'windows' && '[{"platform":"windows-latest-l","rust_targets":"x86_64-pc-windows-msvc","args":""}]') || (github.event_name == 'workflow_dispatch' && github.event.inputs.platform == 'macos' && '[{"platform":"macos-latest","rust_targets":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"}]') || '[{"platform":"macos-latest","rust_targets":"aarch64-apple-darwin","args":"--target aarch64-apple-darwin"},{"platform":"windows-latest-l","rust_targets":"x86_64-pc-windows-msvc","args":""}]') }}
    runs-on: ${{ matrix.platform }}
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Reduce LLVM memory pressure on Windows
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          "CARGO_BUILD_JOBS=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_PROFILE_RELEASE_LTO=off" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_PROFILE_RELEASE_OPT_LEVEL=2" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure Vulkan SDK for Whisper on Windows
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          function Get-VulkanSdkPath {
            if (-not (Test-Path 'C:\VulkanSDK')) {
              return $null
            }
            $candidate = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
            if ($null -eq $candidate) {
              return $null
            }
            $libPath = Join-Path $candidate.FullName 'Lib'
            if (-not (Test-Path $libPath)) {
              return $null
            }
            return $candidate.FullName
          }

          function New-VulkanSdkShimFromWindowsKit {
            $kitsRoot = 'C:\Program Files (x86)\Windows Kits\10\Lib'
            if (-not (Test-Path $kitsRoot)) {
              return $null
            }

            $libCandidates = Get-ChildItem $kitsRoot -Directory -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending |
              ForEach-Object { Join-Path $_.FullName 'um\x64\vulkan-1.lib' } |
              Where-Object { Test-Path $_ }

            $libPath = $libCandidates | Select-Object -First 1
            if ($null -eq $libPath -or -not (Test-Path $libPath)) {
              return $null
            }

            $shimRoot = Join-Path $env:RUNNER_TEMP 'vulkan-sdk-shim'
            $shimLib = Join-Path $shimRoot 'Lib'
            New-Item -Path $shimLib -ItemType Directory -Force | Out-Null
            Copy-Item -Path $libPath -Destination (Join-Path $shimLib 'vulkan-1.lib') -Force
            return $shimRoot
          }

          $sdkPath = Get-VulkanSdkPath
          if ($null -eq $sdkPath) {
            $sdkPath = New-VulkanSdkShimFromWindowsKit
          }

          if ($null -eq $sdkPath) {
            if (Get-Command winget -ErrorAction SilentlyContinue) {
              winget install --id KhronosGroup.VulkanSDK --source winget --exact --silent --disable-interactivity --accept-source-agreements --accept-package-agreements
            }
            $sdkPath = Get-VulkanSdkPath
            if ($null -eq $sdkPath) {
              $sdkPath = New-VulkanSdkShimFromWindowsKit
            }
          }

          if ($null -eq $sdkPath) {
            throw 'Vulkan SDK was not found after installation. whisper-rs-sys requires VULKAN_SDK on Windows.'
          }

          "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using VULKAN_SDK=$sdkPath"

      - name: Import Windows signing certificate
        if: startsWith(matrix.platform, 'windows') && env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != '' && env.WINDOWS_CERTIFICATE_THUMBPRINT != '' && env.WINDOWS_TIMESTAMP_URL != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path certificate -Force | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item -Path certificate/tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Configure Windows signing metadata
        if: startsWith(matrix.platform, 'windows') && env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != '' && env.WINDOWS_CERTIFICATE_THUMBPRINT != '' && env.WINDOWS_TIMESTAMP_URL != ''
        shell: pwsh
        run: |
          $configPath = "src-tauri/tauri.conf.json"
          $config = Get-Content -Path $configPath -Raw | ConvertFrom-Json -AsHashtable
          if (-not $config.ContainsKey("bundle") -or $null -eq $config["bundle"]) {
            $config["bundle"] = @{}
          }
          if (-not $config["bundle"].ContainsKey("windows") -or $null -eq $config["bundle"]["windows"]) {
            $config["bundle"]["windows"] = @{}
          }
          $config["bundle"]["windows"]["certificateThumbprint"] = $env:WINDOWS_CERTIFICATE_THUMBPRINT
          $config["bundle"]["windows"]["digestAlgorithm"] = "sha256"
          $config["bundle"]["windows"]["timestampUrl"] = $env:WINDOWS_TIMESTAMP_URL
          $config | ConvertTo-Json -Depth 100 | Set-Content -Path $configPath -Encoding UTF8

      - name: Prepare App Store Connect API key
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p private_keys
          printf "%s" "$APPLE_API_KEY_CONTENT" > "private_keys/AuthKey_${APPLE_API_KEY}.p8"
          chmod 600 "private_keys/AuthKey_${APPLE_API_KEY}.p8"

      - name: Build and publish signed RC artifacts
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          projectPath: .
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Dr. Toru ${{ github.ref_name }}"
          releaseBody: "Automated build from tag."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') || contains(github.ref_name, '+') }}
          args: ${{ matrix.args }}
