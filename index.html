<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles.css" />
    <title>Dr. Toru</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main id="app-shell" class="app-shell">
      <header class="app-header">
        <h1>Dr. Toru</h1>
        <div class="header-tools">
          <span id="asrLoading" class="asr-loading" hidden>Loading ASR...</span>
          <button
            id="settingsBtn"
            class="header-btn"
            type="button"
            aria-label="Open settings"
          >
            Settings
          </button>
        </div>
      </header>
      <p id="appError" class="app-error" hidden></p>

      <div class="screen-stack">
        <section id="screen-recording" class="screen" data-screen="recording">
          <textarea
            id="transcript"
            class="transcript recording-transcript"
            readonly
            aria-label="Running transcript"
          ></textarea>
          <div class="recording-actions">
            <button id="recordBtn" type="button" disabled>Transcribe</button>
          </div>
        </section>

        <section
          id="screen-list"
          class="screen"
          data-screen="list"
          hidden
          aria-hidden="true"
        >
          <h2>Recordings</h2>
          <div id="recording-list"></div>
        </section>

        <section
          id="screen-settings"
          class="screen"
          data-screen="settings"
          hidden
          aria-hidden="true"
        >
          <h2>Settings</h2>
          <p id="pluginSummary" class="placeholder">
            Plugin registry loading...
          </p>
          <h3>ASR Quality</h3>
          <div class="settings-grid">
            <label class="setting-field">
              <span>Chunk (secs)</span>
              <input
                id="asrChunkSecs"
                type="number"
                min="2"
                max="20"
                step="0.5"
              />
            </label>
            <label class="setting-field">
              <span>Stride (secs)</span>
              <input
                id="asrStrideSecs"
                type="number"
                min="0.5"
                max="19.5"
                step="0.5"
              />
            </label>
            <label class="setting-field">
              <span>Silence RMS</span>
              <input
                id="asrSilenceRms"
                type="number"
                min="0.0001"
                max="0.05"
                step="0.0001"
              />
            </label>
            <label class="setting-field">
              <span>Silence Peak</span>
              <input
                id="asrSilencePeak"
                type="number"
                min="0.0001"
                max="0.2"
                step="0.0001"
              />
            </label>
            <label class="setting-field">
              <span>Speech Hold (chunks)</span>
              <input
                id="asrSilenceHoldChunks"
                type="number"
                min="0"
                max="12"
                step="1"
              />
            </label>
            <label class="setting-field">
              <span>Silence Probe Every</span>
              <input
                id="asrSilenceProbeEvery"
                type="number"
                min="1"
                max="50"
                step="1"
              />
            </label>
            <label class="setting-field">
              <span>ORT Threads</span>
              <input
                id="asrOrtThreads"
                type="number"
                min="1"
                max="8"
                step="1"
              />
            </label>
            <label class="setting-field">
              <span>Beam Width</span>
              <input
                id="asrBeamWidth"
                type="number"
                min="1"
                max="32"
                step="1"
              />
            </label>
            <label class="setting-field">
              <span>LM Alpha</span>
              <input id="asrLmAlpha" type="number" min="0" max="3" step="0.1" />
            </label>
            <label class="setting-field">
              <span>LM Beta</span>
              <input id="asrLmBeta" type="number" min="-2" max="5" step="0.1" />
            </label>
            <label class="setting-field">
              <span>Min Token LogP</span>
              <input
                id="asrMinTokenLogp"
                type="number"
                min="-20"
                max="0"
                step="0.1"
              />
            </label>
            <label class="setting-field">
              <span>Beam Prune LogP</span>
              <input
                id="asrBeamPruneLogp"
                type="number"
                min="-30"
                max="0"
                step="0.1"
              />
            </label>
          </div>
          <div class="actions">
            <button id="saveAsrSettingsBtn" type="button">
              Save ASR Settings
            </button>
          </div>
          <p id="asrSettingsStatus" class="status"></p>
          <div class="actions">
            <button id="importPluginBtn" type="button">
              Import Model File
            </button>
            <button id="toggleLlmBtn" type="button" disabled>
              Start LLM Service
            </button>
          </div>
          <p id="llmServiceStatus" class="status">LLM service: unavailable</p>
          <h3>LLM Test</h3>
          <textarea
            id="llmInput"
            class="transcript"
            rows="5"
            placeholder="Paste note text to test LLM output."
          ></textarea>
          <div class="actions">
            <button id="runLlmBtn" type="button" disabled>Run LLM Test</button>
          </div>
          <div id="llmOutput" class="transcript">(No LLM output)</div>
        </section>
      </div>

      <nav class="shell-nav" aria-label="Primary">
        <button type="button" class="nav-btn" data-route="list">List</button>
        <button type="button" class="nav-btn" data-route="recording">
          Record
        </button>
      </nav>
    </main>
  </body>
</html>
